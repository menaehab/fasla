<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .login-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .login-section input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        .btn-warning:hover {
            background: #dd6b20;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .product-card {
            border: 2px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .product-card h3 {
            color: #2d3748;
            margin-bottom: 8px;
        }

        .product-card p {
            color: #718096;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .product-card .price {
            color: #48bb78;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }

        .product-card .old-price {
            color: #a0aec0;
            text-decoration: line-through;
            font-size: 14px;
            margin-left: 10px;
        }

        .product-card .stock {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-card .stock.in-stock {
            background: #c6f6d5;
            color: #22543d;
        }

        .product-card .stock.out-of-stock {
            background: #fed7d7;
            color: #742a2a;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .product-actions input {
            width: 60px;
            padding: 5px;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }

        .cart-item {
            border: 2px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #f7fafc;
        }

        .cart-item.unavailable {
            border-color: #fc8181;
            background: #fff5f5;
        }

        .cart-item h4 {
            color: #2d3748;
            margin-bottom: 8px;
        }

        .cart-item-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .cart-summary {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .cart-summary h3 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .cart-summary p {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .cart-summary .total {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 10px;
        }

        .checkout-section {
            margin-top: 15px;
        }

        .checkout-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .response-box {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .response-box pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
            color: #2d3748;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1>🛒 Cart API Test Page</h1>
            <div class="login-section">
                <input type="email" id="email" placeholder="Email (test@example.com)" value="test@example.com">
                <input type="password" id="password" placeholder="Password (password123)" value="password123">
                <button class="btn btn-primary" onclick="login()">تسجيل الدخول</button>
                <button class="btn btn-danger" onclick="logout()">تسجيل الخروج</button>
            </div>
            <div id="loginStatus"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Products Section -->
            <div class="section">
                <h2>📦 المنتجات المتاحة</h2>
                <button class="btn btn-success" onclick="loadProducts()" style="margin-bottom: 15px;">
                    تحديث المنتجات
                </button>
                <div id="productsList"></div>
            </div>

            <!-- Cart Section -->
            <div class="section">
                <h2>🛍️ السلة</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                    <button class="btn btn-success" onclick="loadCart()">تحديث السلة</button>
                    <button class="btn btn-warning" onclick="validateCart()">التحقق من السلة</button>
                    <button class="btn btn-danger" onclick="clearCart()">تفريغ السلة</button>
                </div>
                <div id="cartItems"></div>
                <div id="cartSummary"></div>
                
                <div class="checkout-section">
                    <h3>إتمام الطلب</h3>
                    <input type="text" id="shippingAddress" placeholder="عنوان الشحن" value="123 Main St, Cairo, Egypt">
                    <button class="btn btn-success" onclick="createOrderFromCart()" style="width: 100%;">
                        إنشاء طلب من السلة
                    </button>
                </div>

                <div class="response-box">
                    <h4>آخر استجابة:</h4>
                    <pre id="responseBox">لا توجد استجابة بعد...</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        let authToken = localStorage.getItem('authToken') || '';

        // Check if already logged in
        if (authToken) {
            showStatus('loginStatus', 'تم تسجيل الدخول مسبقاً', 'success');
            loadProducts();
            loadCart();
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok && data.token) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    showStatus('loginStatus', '✅ تم تسجيل الدخول بنجاح!', 'success');
                    loadProducts();
                    loadCart();
                } else {
                    showStatus('loginStatus', '❌ فشل تسجيل الدخول: ' + (data.message || 'خطأ غير معروف'), 'error');
                }
            } catch (error) {
                showStatus('loginStatus', '❌ خطأ في الاتصال: ' + error.message, 'error');
            }
        }

        function logout() {
            authToken = '';
            localStorage.removeItem('authToken');
            showStatus('loginStatus', 'تم تسجيل الخروج', 'success');
            document.getElementById('productsList').innerHTML = '';
            document.getElementById('cartItems').innerHTML = '';
            document.getElementById('cartSummary').innerHTML = '';
        }

        async function loadProducts() {
            if (!authToken) {
                alert('يرجى تسجيل الدخول أولاً');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/categories`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                
                // Get products from first category
                if (data.data && data.data.length > 0) {
                    const category = data.data[0];
                    if (category.sub_categories && category.sub_categories.length > 0) {
                        const subCategory = category.sub_categories[0];
                        await loadProductsBySubCategory(subCategory.slug);
                    }
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        async function loadProductsBySubCategory(slug) {
            try {
                const response = await fetch(`${API_URL}/products/${slug}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                displayProducts(data.data || []);
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<p>لا توجد منتجات متاحة</p>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <h3>${product.name}</h3>
                    <p>${product.description || 'لا يوجد وصف'}</p>
                    <div class="price">
                        ${product.discounted_price || product.price} جنيه
                        ${product.discounted_price ? `<span class="old-price">${product.price} جنيه</span>` : ''}
                    </div>
                    <span class="stock ${product.quantity > 0 ? 'in-stock' : 'out-of-stock'}">
                        ${product.quantity > 0 ? `متوفر: ${product.quantity}` : 'نفذت الكمية'}
                    </span>
                    <div class="product-actions">
                        <input type="number" id="qty-${product.id}" value="1" min="1" max="${product.quantity}">
                        <button class="btn btn-success" onclick="addToCart(${product.id})" ${product.quantity === 0 ? 'disabled' : ''}>
                            إضافة للسلة
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function addToCart(productId) {
            if (!authToken) {
                alert('يرجى تسجيل الدخول أولاً');
                return;
            }

            const quantity = parseInt(document.getElementById(`qty-${productId}`).value);

            try {
                const response = await fetch(`${API_URL}/cart`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        quantity: quantity
                    })
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok) {
                    alert('✅ ' + data.message);
                    loadCart();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        }

        async function loadCart() {
            if (!authToken) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/cart`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                showResponse(data);
                displayCart(data.data);
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }

        function displayCart(cart) {
            const itemsContainer = document.getElementById('cartItems');
            const summaryContainer = document.getElementById('cartSummary');

            if (!cart || !cart.items || cart.items.length === 0) {
                itemsContainer.innerHTML = '<p>السلة فارغة</p>';
                summaryContainer.innerHTML = '';
                return;
            }

            itemsContainer.innerHTML = cart.items.map(item => `
                <div class="cart-item ${!item.is_available ? 'unavailable' : ''}">
                    <h4>${item.product.name}</h4>
                    <p>السعر: ${item.price} جنيه</p>
                    <p>الكمية: ${item.quantity}</p>
                    <p>المجموع: ${item.subtotal} جنيه</p>
                    ${!item.is_available ? `
                        <p style="color: #e53e3e; font-weight: bold;">
                            ⚠️ غير متوفر! الكمية المتاحة: ${item.available_quantity}
                        </p>
                    ` : ''}
                    <div class="cart-item-actions">
                        <input type="number" id="cart-qty-${item.id}" value="${item.quantity}" min="1">
                        <button class="btn btn-warning" onclick="updateCartItem(${item.id})">تحديث</button>
                        <button class="btn btn-danger" onclick="removeFromCart(${item.id})">حذف</button>
                    </div>
                </div>
            `).join('');

            summaryContainer.innerHTML = `
                <div class="cart-summary">
                    <h3>ملخص السلة</h3>
                    <p>عدد المنتجات: <span class="badge">${cart.total_items}</span></p>
                    <p class="total">الإجمالي: ${cart.total_price} جنيه</p>
                    <p style="color: ${cart.can_checkout ? '#48bb78' : '#e53e3e'}; font-weight: bold;">
                        ${cart.can_checkout ? '✅ جاهز للدفع' : '❌ غير جاهز للدفع'}
                    </p>
                </div>
            `;
        }

        async function updateCartItem(cartItemId) {
            const quantity = parseInt(document.getElementById(`cart-qty-${cartItemId}`).value);

            try {
                const response = await fetch(`${API_URL}/cart/${cartItemId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ quantity })
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok) {
                    alert('✅ ' + data.message);
                    loadCart();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        }

        async function removeFromCart(cartItemId) {
            if (!confirm('هل تريد حذف هذا المنتج من السلة؟')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/cart/${cartItemId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok) {
                    alert('✅ ' + data.message);
                    loadCart();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        }

        async function clearCart() {
            if (!confirm('هل تريد تفريغ السلة بالكامل؟')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/cart-clear`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok) {
                    alert('✅ ' + data.message);
                    loadCart();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        }

        async function validateCart() {
            try {
                const response = await fetch(`${API_URL}/cart/validate`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok) {
                    alert('✅ ' + data.message);
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        }

        async function createOrderFromCart() {
            const shippingAddress = document.getElementById('shippingAddress').value;

            if (!shippingAddress) {
                alert('يرجى إدخال عنوان الشحن');
                return;
            }

            if (!confirm('هل تريد إنشاء طلب من السلة؟')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/orders/from-cart`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ shipping_address: shippingAddress })
                });

                const data = await response.json();
                showResponse(data);

                if (response.ok) {
                    alert('✅ ' + data.message + '\nرقم الطلب: ' + data.order.slug);
                    loadCart();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        }

        function showResponse(data) {
            document.getElementById('responseBox').textContent = JSON.stringify(data, null, 2);
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
    </script>
</body>
</html>
